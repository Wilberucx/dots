name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build binary
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -o dots-${{ matrix.os }}-${{ matrix.arch }} \
            -ldflags="-s -w" \
            ./cmd/dots/

      - name: Create tarball
        run: |
          tar -czf dots-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
            dots-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dots-${{ matrix.os }}-${{ matrix.arch }}
          path: dots-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify artifacts
        run: |
          echo "=== Artifacts downloaded ==="
          find artifacts/ -type f -ls

      - name: Build release body
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [ -f "docs/release-notes/v${VERSION}.md" ]; then
            cat "docs/release-notes/v${VERSION}.md" > release-body.md
          else
            echo "Release v${VERSION}" > release-body.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: |
            artifacts/*/*.tar.gz
